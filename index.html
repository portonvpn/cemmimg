            }, 100); 
        }

        function closeTerminal() { 
            if (!terminal) return;
            terminal.classList.remove('active'); 
            setTimeout(() => { 
                terminal.style.display = 'none'; 
                if (termInput) termInput.value = ''; 
            }, 300); 
        }

        function openLore() { 
            if (!lore) return;
            lore.style.display = 'flex'; 
            void lore.offsetWidth;
            lore.classList.add('active'); 
        }

        function closeLore() { 
            if (!lore) return;
            lore.classList.remove('active'); 
            setTimeout(() => { 
                lore.style.display = 'none'; 
            }, 300); 
        }

        if (termInput) {
            termInput.addEventListener('keydown', (e) => { 
                if (e.key === 'Enter') { 
                    const code = termInput.value.toLowerCase().trim(); 
                    if (code === 'gamdom') { 
                        document.getElementById("mainPage").style.display = "none"; 
                        document.getElementById("secretPage").style.display = "block"; 
                        closeTerminal(); 
                    }
                    else if (code === 'cem') { 
                        document.getElementById("mainPage").style.display = "none"; 
                        document.getElementById("fakePage").style.display = "block"; 
                        closeTerminal(); 
                        if (window.confetti) window.confetti({ particleCount: 150 }); 
                    }
                    else { 
                        termInput.style.color = 'red'; 
                        setTimeout(() => { 
                            termInput.style.color = '#b983ff'; 
                            termInput.value = ''; 
                        }, 500); 
                    }
                } 
            });
        }

        let clickTimer = null;
        document.getElementById('vaultTrigger').addEventListener('click', (e) => { 
            e.stopPropagation();
            if (clickTimer === null) { 
                clickTimer = setTimeout(() => { 
                    clickTimer = null; 
                    openLore(); 
                }, 400); 
            } 
            else { 
                clearTimeout(clickTimer); 
                clickTimer = null; 
                unlockAudio(); 
                openTerminal(); 
            } 
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof VANTA !== 'undefined' && VANTA.DOTS) {
                VANTA.DOTS({ 
                    el: "#bg", 
                    mouseControls: true, 
                    touchControls: true, 
                    color: 0xb983ff, 
                    color2: 0x7f00ff, 
                    backgroundColor: 0x0b0615, 
                    spacing: 32, 
                    size: 3.2 
                });
            }
            document.querySelectorAll('.head-pop').forEach((el, index) => { 
                el.style.animationDelay = (index * 0.1) + 's'; 
            });
        });
    </script>
</body>
</html>
