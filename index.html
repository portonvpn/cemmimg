    <style>
        :root {

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent !important; outline: none !important; }
        ::selection { background: transparent !important; }
        body { margin: 0; min-height: 100vh; color: white; overflow-x: hidden; background: #0b0615; }

        .button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .btn {
            padding: 22px; border-radius: 26px; border: 1px solid var(--mica-border);
            cursor: pointer; color: white; text-align: left; position: relative;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: bounceIn 0.8s both; display: flex; flex-direction: column; gap: 12px;
            overflow: hidden; backdrop-filter: var(--mica-blur); -webkit-backdrop-filter: var(--mica-blur);
            background-color: var(--mica-bg); 
            box-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255,255,255,0.1);
        }
        .btn.focused, .btn:hover { transform: scale(1.08) translateY(-10px); border-color: rgba(255, 255, 255, 0.5); background-color: rgba(255, 255, 255, 0.05); }
        @keyframes bounceIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .btn i { font-size: 2.4rem; opacity: 0.9; transition: 0.35s; display: flex; align-items: center; height: 40px; }
        .btn.focused i, .btn:hover i { transform: scale(1.15) translateY(-5px) rotate(-3deg); opacity: 1; }
        .btn span { font-weight: 800; font-size: 1.15rem; letter-spacing: 0.5px; }
        .btn p { margin: 0; font-size: 0.8rem; opacity: 0.7; font-weight: 500; }
        .new-star { position: absolute; top: 15px; right: 15px; color: #FFD700; font-size: 1.2rem; filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.8)); }
        .yt-premium { background-image: linear-gradient(135deg, rgba(var(--yt-premium-red), 0.3), rgba(var(--yt-premium-dark), 0.7)); }
        .netflix { background-image: linear-gradient(135deg, rgba(var(--netflix), 0.25), rgba(var(--netflix), 0.03)); }
        .minecraft { background-image: linear-gradient(135deg, rgba(var(--minecraft), 0.2), rgba(var(--minecraft), 0.03)); }
        .fmhy { background-image: linear-gradient(135deg, rgba(var(--fmhy), 0.2), rgba(var(--fmhy), 0.03)); }
        .gta { background-image: linear-gradient(135deg, rgba(var(--gta), 0.3), rgba(var(--gta), 0.05)); color: #ffca28; }
        .spotify { background-image: linear-gradient(135deg, rgba(var(--spotify), 0.2), rgba(var(--spotify), 0.03)); }
        .youtube { background-image: linear-gradient(135deg, rgba(var(--youtube), 0.25), rgba(var(--youtube), 0.03)); }
        .movies { background-image: linear-gradient(135deg, rgba(var(--movies), 0.25), rgba(var(--movies), 0.03)); }
        .apk { background-image: linear-gradient(135deg, rgba(var(--apk), 0.2), rgba(var(--apk), 0.03)); }
        .games { background-image: linear-gradient(135deg, rgba(var(--games), 0.25), rgba(var(--games), 0.03)); }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(40px); z-index: 9999; display: none;
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .overlay.active { opacity: 1; display: flex; }
        .mica-card { 
            width: 92%; max-width: 450px; padding: 35px; 
            background: rgba(20, 20, 30, 0.85); border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 28px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .overlay.active .mica-card { transform: scale(1); }
        #terminal-input {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(185, 131, 255, 0.4);
            border-radius: 12px; color: #b983ff; font-family: monospace; font-size: 1.5rem;

        #secretPage, #fakePage { display: none; padding: 60px 20px; text-align: center; position: relative; z-index: 100; pointer-events: auto; }
        .secret-btn { display: block; width: 100%; max-width: 400px; margin: 15px auto; padding: 22px; border-radius: 20px; font-weight: 900; font-size: 1.4rem; text-decoration: none; backdrop-filter: var(--mica-blur); border: 1px solid var(--mica-border); color: white; position: relative; z-index: 110; }
        .asaru-img { width: 100%; max-width: 320px; max-height: 40vh; object-fit: contain; border-radius: 20px; margin: 20px 0; border: 4px solid rgba(255,255,255,0.15); }
        @media (max-width: 600px) {
            .container { padding: 30px 16px; } .button-grid { grid-template-columns: 1fr; gap: 12px; }
            .btn { padding: 18px 20px; border-radius: 22px; }
        }
    </style>
</head>

<script>
VANTA.DOTS({ el: "#bg", mouseControls: true, touchControls: true, color: 0xb983ff, color2: 0x7f00ff, backgroundColor: 0x0b0615, spacing: 32, size: 3.2 });
let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    const bgMusic = document.getElementById("auroraAmbience");
    bgMusic.play().then(() => { audioUnlocked = true; }).catch(e => {});
}
function fastOpen(url, e, el) {
    unlockAudio();
    const sound = document.getElementById("clickSound");
    sound.currentTime = 0; sound.volume = 0.5; sound.play().catch(() => {});
    window.open(url, '_blank');
}
const termInput = document.getElementById('terminal-input');
const terminal = document.getElementById('terminal-overlay');
const lore = document.getElementById('lore-overlay');
function openTerminal() { terminal.style.display = 'flex'; setTimeout(() => { terminal.classList.add('active'); termInput.focus(); }, 10); }
function closeTerminal() { terminal.classList.remove('active'); setTimeout(() => { terminal.style.display = 'none'; termInput.value = ''; }, 300); }
function openLore() { lore.style.display = 'flex'; setTimeout(() => { lore.classList.add('active'); }, 10); }
function closeLore() { lore.classList.remove('active'); setTimeout(() => { lore.style.display = 'none'; }, 300); }
termInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const code = termInput.value.toLowerCase();
        if (code === 'gamdom') {
            document.getElementById("mainPage").style.display = "none";
            document.getElementById("secretPage").style.display = "block";
            closeTerminal();
        } else if (code === 'cemduo') {
            document.getElementById("mainPage").style.display = "none";
            document.getElementById("fakePage").style.display = "block";
            closeTerminal();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            termInput.style.color = 'red';
            setTimeout(() => { termInput.style.color = '#b983ff'; termInput.value = ''; }, 500);
        }
    }
});
let clickTimer = null;
const trigger = document.getElementById('vaultTrigger');
trigger.addEventListener('click', (e) => {
    e.preventDefault();
    if (clickTimer === null) {
        clickTimer = setTimeout(() => { clickTimer = null; openLore(); }, 500);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        unlockAudio();
        openTerminal();
    }
});
trigger.addEventListener('touchstart', (e) => { e.preventDefault(); trigger.click(); });
</script>
